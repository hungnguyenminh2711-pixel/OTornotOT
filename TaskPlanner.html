// ── SwipeCard: vertical portrait card ────────────────────────────────────────
function SwipeCard({ tpl, zIndex, scale, offsetY, isTop, onLike, onNope }) {
  // Use ref for drag so pointerUp always reads the latest value (avoids stale closure)
  const dragRef = React.useRef({x:0,y:0,active:false,sx:0,sy:0});
  const [dragVis, setDragVis] = React.useState({x:0,y:0,active:false}); // drives render
  const [flying, setFlying] = React.useState(null);
  const cardRef = React.useRef(null);

  function pointerDown(cx,cy){
    if(!isTop) return;
    dragRef.current={x:0,y:0,active:true,sx:cx,sy:cy};
    setDragVis({x:0,y:0,active:true});
  }
  function pointerMove(cx,cy){
    const d=dragRef.current; if(!d.active) return;
    const x=cx-d.sx, y=(cy-d.sy)*0.15;
    dragRef.current={...d,x,y};
    setDragVis({x,y,active:true});
  }
  function pointerUp(){
    const d=dragRef.current; if(!d.active) return;
    dragRef.current={...d,active:false};
    setDragVis({x:0,y:0,active:false});
    if(d.x>50) triggerFly('right');
    else if(d.x<-50) triggerFly('left');
  }
  function triggerFly(dir){
    setFlying(dir);
    setTimeout(()=>{ dir==='right'?onLike():onNope(); },360);
  }

  // Attach touchmove as non-passive so preventDefault actually stops page scroll
  React.useEffect(()=>{
    const el=cardRef.current; if(!el) return;
    function onTouchMove(e){
      if(dragRef.current.active){ e.preventDefault(); pointerMove(e.touches[0].clientX,e.touches[0].clientY); }
    }
    el.addEventListener('touchmove',onTouchMove,{passive:false});
    return ()=>el.removeEventListener('touchmove',onTouchMove);
  },[isTop]);

  const rot = dragVis.x * 0.06;
  const likeOp = Math.min(1, Math.max(0, dragVis.x/60));
  const nopeOp = Math.min(1, Math.max(0, -dragVis.x/60));

  const wrapStyle = {
    zIndex,
    transform: flying==='right' ? 'translateX(170%) rotate(30deg)'
             : flying==='left'  ? 'translateX(-170%) rotate(-30deg)'
             : isTop && dragVis.active
               ? `translateX(${dragVis.x}px) translateY(${dragVis.y}px) rotate(${rot}deg)`
               : `scale(${scale}) translateY(${offsetY}px)`,
    transition: flying ? 'transform .36s ease, opacity .36s ease'
              : isTop && dragVis.active ? 'none' : 'transform .28s ease',
    opacity: flying ? 0 : 1,
    touchAction: 'none',
    userSelect: 'none',
    WebkitUserSelect: 'none',
  };

  const timeLabel = tpl.timeType==='range'&&tpl.startTime ? tpl.startTime+'–'+tpl.endTime : tpl.duration+' min';
  const priColor = {high:'#fc8181',medium:'#f6ad55',low:'#68d391'}[tpl.priority];
  const priLabel = {high:'High priority',medium:'Medium',low:'Flexible'}[tpl.priority];
  // Lighter tint for hero bg
  const heroGrad = `linear-gradient(160deg,${tpl.color}ee,${tpl.color}99)`;

  return (
    <div className="tinder-wrap" style={wrapStyle} ref={cardRef}
      onMouseDown={e=>pointerDown(e.clientX,e.clientY)}
      onMouseMove={e=>{ if(dragRef.current.active) pointerMove(e.clientX,e.clientY); }}
      onMouseUp={pointerUp} onMouseLeave={pointerUp}
      onTouchStart={e=>pointerDown(e.touches[0].clientX,e.touches[0].clientY)}
      onTouchEnd={pointerUp}
    >
      <div className="tinder-c">
        {/* Hero: coloured top with large emoji */}
        <div className="tinder-c-hero" style={{background:heroGrad}}>
          {isTop&&<>
            <div className="tinder-badge like" style={{opacity:likeOp}}>MATCH ❤️</div>
            <div className="tinder-badge nope" style={{opacity:nopeOp}}>PASS ✕</div>
          </>}
          <div style={{fontSize:64,lineHeight:1,filter:'drop-shadow(0 4px 8px rgba(0,0,0,.2))'}}>{tpl.emoji}</div>
          <div style={{fontSize:10,fontWeight:800,color:'rgba(255,255,255,.85)',textTransform:'uppercase',letterSpacing:1.5,background:'rgba(0,0,0,.15)',padding:'2px 10px',borderRadius:20}}>{tpl.tag}</div>
        </div>
        {/* Body */}
        <div className="tinder-c-body">
          <div style={{fontSize:18,fontWeight:800,color:'#1a202c',marginBottom:6,lineHeight:1.2}}>{tpl.label}</div>
          <div style={{fontSize:12,color:'#718096',marginBottom:14,lineHeight:1.5}}>{tpl.hint}</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            <span style={{fontSize:11,fontWeight:600,padding:'4px 10px',borderRadius:20,background:'#edf2ff',color:'#3730a3'}}>⏱ {timeLabel}</span>
            <span style={{fontSize:11,fontWeight:600,padding:'4px 10px',borderRadius:20,background:priColor+'22',color:priColor}}>{priLabel}</span>
            {tpl.mustDo&&<span style={{fontSize:11,fontWeight:600,padding:'4px 10px',borderRadius:20,background:'#fff5f5',color:'#c53030'}}>Must Do</span>}
            <span style={{fontSize:11,fontWeight:600,padding:'4px 10px',borderRadius:20,background:'#f0fff4',color:'#276749'}}>{tpl.frequency==='weekly'?'📅 Weekly':'📆 Weekdays'}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── TutorialView ───────────────────────────────────────────────────────────────
function TutorialView({ onSaveRoutine, onGoToRoutine }) {
  const [phase, setPhase] = React.useState('welcome');
  const [deckIdx, setDeckIdx] = React.useState(0);
  const [liked, setLiked] = React.useState([]);    // array of DECK_TEMPLATES
  const [formIdx, setFormIdx] = React.useState(0); // which liked card we're customising
  const [saved, setSaved]  = React.useState([]);

  const MAX_PICKS = 3;
  const remaining = DECK_TEMPLATES.length - deckIdx;

  function handleLike() {
    const tpl = DECK_TEMPLATES[deckIdx];
    const newLiked = [...liked, tpl];
    setLiked(newLiked);
    if(newLiked.length >= MAX_PICKS) { setTimeout(()=>{ setFormIdx(0); setPhase('customize'); }, 400); }
    else setDeckIdx(i=>i+1);
  }
  function handleNope() {
    const nextIdx = deckIdx+1;
    setDeckIdx(nextIdx);
    if(nextIdx >= DECK_TEMPLATES.length) {
      setTimeout(()=>{ liked.length>0 ? (setFormIdx(0),setPhase('customize')) : setPhase('swim'); }, 400);
    }
  }
  function handleSave(r) {
    onSaveRoutine(r);
    const newSaved=[...saved,r];
    setSaved(newSaved);
    if(formIdx+1 < liked.length) setFormIdx(i=>i+1);
    else setPhase('complete');
  }

  // ── Welcome ────────────────────────────────────────────────────────────────
  if(phase==='welcome') return (
    <div className="card" style={{maxWidth:520,margin:'24px auto',textAlign:'center',padding:'32px 24px'}}>
      <div style={{fontSize:64,marginBottom:12,display:'block',animation:'bounce 1.5s infinite'}}>🧁</div>
      <div className="tut-title">Build your daily routine</div>
      <div className="tut-sub">I'll show you task templates — swipe right to pick one, left to skip. Choose 3 and we'll set them up together.</div>
      <div className="tut-choice-row">
        <div className="tut-choice" onClick={()=>setPhase('swipe')}>
          <span className="tut-choice-icon">🍰</span>
          <div className="tut-choice-label">Eat the Cake</div>
          <div className="tut-choice-desc">Swipe through templates and I'll guide you step by step.</div>
        </div>
        <div className="tut-choice" onClick={()=>onGoToRoutine()}>
          <span className="tut-choice-icon">🏊</span>
          <div className="tut-choice-label">Let me swim</div>
          <div className="tut-choice-desc">Go straight to Routine Setup and create tasks your way.</div>
        </div>
      </div>
    </div>
  );

  // ── Swim alone ─────────────────────────────────────────────────────────────
  if(phase==='swim') return (
    <div className="card" style={{maxWidth:480,margin:'24px auto',textAlign:'center',padding:'36px 28px'}}>
      <div style={{fontSize:56,marginBottom:14}}>🏊</div>
      <div className="tut-title" style={{marginBottom:8}}>It seems you need to swim by yourself.</div>
      <div style={{fontSize:15,color:'#718096',marginBottom:10,lineHeight:1.6}}>Let's dive in. Don't worry — you can find me as a swimming float anytime.</div>
      <div style={{fontSize:13,color:'#a0aec0',marginBottom:24}}>Head to the Routine tab and add tasks at your own pace. I'll be right here.</div>
      <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
        <button className="btn btn-secondary" onClick={()=>{setPhase('welcome');setDeckIdx(0);setLiked([]);setSaved([]);}}>↩ Try again</button>
        <button className="btn btn-primary" onClick={onGoToRoutine}>🏃 Go to Routine Setup</button>
      </div>
    </div>
  );

  // ── Customize: open RoutineTaskForm for each liked card in sequence ─────────
  if(phase==='customize') {
    const tpl = liked[formIdx];
    const prefill = buildRoutineFromTemplate(tpl);
    return (
      <div>
        <div style={{textAlign:'center',padding:'20px 16px 4px'}}>
          <div style={{fontSize:13,fontWeight:700,color:'#667eea',marginBottom:4}}>
            Setting up {formIdx+1} of {liked.length} — {tpl.emoji} {tpl.label}
          </div>
          <div style={{fontSize:12,color:'#a0aec0'}}>Adjust anything you like, then save.</div>
        </div>
        <RoutineTaskForm
          routine={prefill}
          onSave={handleSave}
          onClose={()=>setPhase('swim')}
        />
      </div>
    );
  }

  // ── Complete ───────────────────────────────────────────────────────────────
  if(phase==='complete') return (
    <div className="card" style={{maxWidth:500,margin:'24px auto',textAlign:'center',padding:32}}>
      <div style={{marginBottom:12}}>
        <span className="confetti-char">🎉</span><span className="confetti-char">🎊</span><span className="confetti-char">✨</span>
      </div>
      <div className="tut-title" style={{marginBottom:6}}>You're all set!</div>
      <div style={{fontSize:13,color:'#718096',marginBottom:20}}>Your routines are saved and will appear every day they apply.</div>
      {saved.map((r,i)=>(
        <div key={i} className="tut-saved-task">
          <span style={{fontSize:20}}>{liked[i]?.emoji||'✅'}</span>
          <div style={{flex:1,textAlign:'left'}}>
            <div style={{fontSize:13,fontWeight:700,color:'#2d3748'}}>{r.title}</div>
            <div style={{fontSize:11,color:'#718096'}}>{r.timeType==='range'&&r.startTime?r.startTime+'–'+r.endTime:r.duration+'min'} · {r.priority}{r.mustDo?' · Must Do':''}</div>
          </div>
          <span style={{color:'#48bb78',fontSize:18}}>✓</span>
        </div>
      ))}
      <div style={{display:'flex',gap:10,justifyContent:'center',marginTop:20,flexWrap:'wrap'}}>
        <button className="btn btn-secondary" onClick={()=>{setPhase('welcome');setDeckIdx(0);setLiked([]);setSaved([]);}}>↩ Start over</button>
        <button className="btn btn-primary" onClick={onGoToRoutine}>⚙️ See all routines →</button>
      </div>
    </div>
  );

  // ── Swipe deck ─────────────────────────────────────────────────────────────
  const visibleCards = DECK_TEMPLATES.slice(deckIdx, deckIdx+3);
  // Per-card status for sidebar list
  const likedIds = new Set(liked.map(t=>t.id));
  return (
    <div style={{maxWidth:480,margin:'0 auto',padding:'8px 12px 24px'}}>
      {/* Pick counter */}
      <div style={{textAlign:'center',marginBottom:10}}>
        <div className="tinder-hearts">
          {Array.from({length:MAX_PICKS}).map((_,i)=>(
            <span key={i} style={{fontSize:22,opacity:i<liked.length?1:.18,transition:'opacity .3s'}}>❤️</span>
          ))}
        </div>
        <div style={{fontSize:11,color:'#a0aec0'}}>
          {liked.length<MAX_PICKS
            ? `Pick ${MAX_PICKS-liked.length} more`
            : 'Great picks! Setting them up…'}
        </div>
      </div>

      {/* Side-by-side: card stack + list */}
      <div className="tinder-scene">
        {/* Left: card stack */}
        <div className="tinder-left">
          {/* Swipe hint banner */}
          <div className="swipe-hint-banner" style={{width:'100%',boxSizing:'border-box'}}>
            <span className="swipe-arrow left" style={{fontSize:22}}>👈</span>
            <div style={{textAlign:'center'}}>
              <div>skip &nbsp;<span style={{color:'#a0aec0',fontSize:10}}>or</span>&nbsp; pick ❤️</div>
            </div>
            <span className="swipe-arrow" style={{fontSize:22}}>👉</span>
          </div>
          {/* Progress bar */}
          <div style={{width:'100%',height:4,background:'#e2e8f0',borderRadius:4,margin:'8px 0',overflow:'hidden'}}>
            <div style={{height:'100%',width:(deckIdx/DECK_TEMPLATES.length*100)+'%',background:'linear-gradient(90deg,#667eea,#9f7aea)',borderRadius:4,transition:'width .4s'}}/>
          </div>
          <div style={{fontSize:10,color:'#a0aec0',alignSelf:'flex-end',marginBottom:4}}>{deckIdx+1} / {DECK_TEMPLATES.length}</div>
          <div className="tinder-arena">
            {deckIdx >= DECK_TEMPLATES.length
              ? <div style={{textAlign:'center',color:'#a0aec0',fontSize:13,padding:32}}>Deck finished!</div>
              : visibleCards.map((tpl,i)=>{
                  const isTop = i===0;
                  const scale = 1 - i*0.035;
                  const offsetY = i*12;
                  return (
                    <SwipeCard key={tpl.id} tpl={tpl} zIndex={10-i} scale={scale} offsetY={offsetY}
                      isTop={isTop} onLike={handleLike} onNope={handleNope}/>
                  );
                })
            }
          </div>
          {/* Action buttons */}
          {deckIdx < DECK_TEMPLATES.length && (
            <div className="tinder-actions">
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <button className="tinder-btn nope" onClick={handleNope} title="Skip">✕</button>
                <div className="tinder-btn-label">Skip</div>
              </div>
              <div style={{textAlign:'center',fontSize:10,color:'#cbd5e0',lineHeight:1.6}}>swipe<br/>or click</div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <button className="tinder-btn like" onClick={handleLike} title="Pick this">❤️</button>
                <div className="tinder-btn-label">Pick</div>
              </div>
            </div>
          )}
        </div>

        {/* Right: full deck list */}
        <div className="tinder-right">
          <div style={{fontSize:10,fontWeight:800,color:'#667eea',textTransform:'uppercase',letterSpacing:.8,marginBottom:10,paddingBottom:6,borderBottom:'2px solid #e2e8f0'}}>📋 All Templates</div>
          <div className="deck-list">
            {DECK_TEMPLATES.map((t,i)=>{
              const isActive = i===deckIdx;
              const isLiked = likedIds.has(t.id);
              const isSkipped = i<deckIdx && !isLiked;
              const cls = 'deck-item'+(isActive?' active':isLiked?' liked':isSkipped?' skipped':'');
              return (
                <div key={t.id} className={cls}>
                  <span className="deck-item-emoji">{t.emoji}</span>
                  <span className="deck-item-name">{t.label}</span>
                  <span className="deck-item-status">
                    {isLiked?'❤️':isActive?'👆':isSkipped?'·':''}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const today = toISO(new Date());
  // ── localStorage helpers ──────────────────────────────────────────────────
  function lsGet(key, fallback) { try { const v=localStorage.getItem(key); return v!==null?JSON.parse(v):fallback; } catch(e){ return fallback; } }
  function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }

  const [tasks, setTasks] = useState(()=>lsGet('tp_tasks', SAMPLE_TASKS));
  const [view, setView] = useState('daily');
  const [showForm, setShowForm] = useState(false);
  const [editTask, setEditTask] = useState(null);
  const [prefillDate, setPrefillDate] = useState(null);
  const [weekOffset, setWeekOffset] = useState(0);
  const [showReschedule, setShowReschedule] = useState(false);
  const [gmailToken, setGmailToken] = useState(null);
  const [emails, setEmails] = useState([]);
  const [isDemoMode, setIsDemoMode] = useState(false);
  const [syncStatus, setSyncStatus] = useState('idle');
  const [lastSync, setLastSync] = useState(null);
  const [emailSettings, setEmailSettings] = useState(()=>lsGet('tp_settings', {clientId:'',userEmail:'',syncTime:'07:00',calDaysAhead:14,calAutoSync:true}));
  const [showSettings, setShowSettings] = useState(false);
  const [alerts, setAlerts] = useState([]);
  const [tomorrowSuggestions, setTomorrowSuggestions] = useState([]);
  const [top3, setTop3] = useState(()=>lsGet('tp_top3', {tasks:[null,null,null],forDate:null}));
  const schedulerFired = useRef(new Set());
  const [calendarToken, setCalendarToken] = useState(null);
  const [calSyncStatus, setCalSyncStatus] = useState('idle');
  const [routineTasks, setRoutineTasks] = useState(()=>lsGet('tp_routines', SAMPLE_ROUTINES));
  const calSyncedIds = useRef(new Map());
  const routineMatVersion = useRef(0);

  // ── Persist to localStorage on every change ────────────────────────────────
  useEffect(()=>{ lsSet('tp_tasks', tasks); }, [tasks]);
  useEffect(()=>{ lsSet('tp_routines', routineTasks); }, [routineTasks]);
  useEffect(()=>{ lsSet('tp_top3', top3); }, [top3]);
  useEffect(()=>{ lsSet('tp_settings', emailSettings); }, [emailSettings]);

  // Auto-materialize routines as real scheduled tasks for today + next 13 days
  useEffect(()=>{
    const ver = ++routineMatVersion.current;
    const dates = Array.from({length:14},(_,i)=>daysFromNow(i));
    setTasks(prev=>{
      let next=[...prev];
      dates.forEach(date=>{
        const dow=new Date(date+'T00:00:00').getDay();
        routineTasks.filter(r=>r.active&&r.weekDays.includes(dow)).forEach(r=>{
          const exists=next.some(t=>t.fromRoutineId===r.id&&t.scheduledDate===date);
          if(!exists){
            const hrs=r.estimatedHours||(r.timeType==='range'&&r.startTime
              ?(()=>{const[sh,sm]=r.startTime.split(':').map(Number);const[eh,em]=(r.endTime||r.startTime).split(':').map(Number);return Math.max(.25,(eh*60+em-sh*60-sm)/60);})()
              :r.duration/60)||.5;
            const startNote=r.timeType==='range'&&r.startTime?' ('+r.startTime+'–'+r.endTime+')':'';
            next.push({
              id:'rt_'+r.id+'_'+date,
              title:r.title+startNote,
              priority:r.priority,
              status:'todo',
              dueDate:date,
              scheduledDate:date,
              category:'Routine',
              estimatedHours:Math.round(hrs*10)/10,
              description:r.frequency==='weekly'?'Weekly routine':'Daily routine',
              createdAt:Date.now(),
              fromEmail:false,
              fromRoutineId:r.id,
              isRoutine:true,
            });
          }
        });
      });
      return next;
    });
  },[routineTasks]);

  function addAlert(type, title, text) {
    const a={id:uid(),type,title,text};
    setAlerts(p=>[...p.slice(-4),a]);
    if('Notification' in window && Notification.permission==='granted') new Notification(title,{body:text,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📋</text></svg>'});
  }

  function toggleTask(id) { setTasks(p=>p.map(t=>t.id===id?{...t,status:t.status==='done'?'todo':'done'}:t)); }
  function saveTask(task) { setTasks(p=>{const idx=p.findIndex(t=>t.id===task.id); return idx>=0?p.map(t=>t.id===task.id?task:t):[...p,task];}); setShowForm(false); setEditTask(null); setPrefillDate(null); }
  function deleteTask(id) { if(confirm('Delete this task?')) setTasks(p=>p.filter(t=>t.id!==id)); }
  function openAdd(date, prefill) { setPrefillDate(date||today); setEditTask(prefill?{...prefill,scheduledDate:date||today,dueDate:date||today,status:'todo',id:null}:null); setShowForm(true); }
  function openEdit(task) { setEditTask(task); setPrefillDate(null); setShowForm(true); }

  // Routine helpers
  function saveRoutine(r){ setRoutineTasks(p=>{ const idx=p.findIndex(x=>x.id===r.id); return idx>=0?[...p.slice(0,idx),r,...p.slice(idx+1)]:[...p,r]; }); }
  function deleteRoutine(id){ setRoutineTasks(p=>p.filter(r=>r.id!==id)); }
  function toggleRoutine(id){ setRoutineTasks(p=>p.map(r=>r.id===id?{...r,active:!r.active}:r)); }
  function todayRoutines(){ const dow=new Date().getDay(); return routineTasks.filter(r=>r.active&&r.weekDays.includes(dow)); }
  function routineAlreadyScheduled(r){ return tasks.some(t=>t.scheduledDate===toISO(new Date())&&t.title===r.title&&t.status!=='done'); }

  function buildTop3FromTasks(taskList) {
    const tomorrow=daysFromNow(1);
    const seen=new Set();
    const candidates=[...taskList]
      .filter(t=>t.status!=='done'&&(t.scheduledDate===today||t.scheduledDate===tomorrow||t.dueDate===today||t.dueDate===tomorrow))
      .sort((a,b)=>scoreTask(b)-scoreTask(a))
      .filter(t=>{ if(seen.has(t.id)) return false; seen.add(t.id); return true; });
    return [candidates[0]||null, candidates[1]||null, candidates[2]||null];
  }
  function genTomorrowSuggestions() {
    const tomorrow=daysFromNow(1);
    const newTasks=buildTop3FromTasks(tasks);
    setTomorrowSuggestions(newTasks.filter(Boolean));
    setTop3({tasks:newTasks, forDate:tomorrow});
    const nearDl=tasks.filter(t=>t.status!=='done'&&diffDays(t.dueDate)>=0&&diffDays(t.dueDate)<=5);
    const extra=nearDl.length>0?' · ⏰ '+nearDl.length+' task'+(nearDl.length!==1?'s':'')+' due this week!':'';
    addAlert('suggestion',"🌅 Top 3 for tomorrow ready","Tap daily view to review."+extra);
  }
  function switchTop3Slot(task, slot) { // slot 0/1/2
    setTop3(p=>{
      const t=[...(p.tasks||[null,null,null])]; t[slot]=task;
      // If forDate not set yet (manual lock before 17:10), default to today
      const forDate = p.forDate || toISO(new Date());
      return {...p,tasks:t,forDate};
    });
  }

  async function checkUrgent() {
    const urgentEmails=emails.filter(e=>e.urgent&&e.isNew);
    const jiraNew=emails.filter(e=>e.category==='jira'&&e.isNew);
    if(urgentEmails.length) addAlert('urgent','🔥 Urgent Emails',urgentEmails.length+' urgent email(s) need attention!');
    if(jiraNew.length) addAlert('jira','New Jira Tickets',jiraNew.length+' new Jira ticket(s) assigned or mentioning you.');
  }

  async function syncCalendar(tok) {
    const token=tok||calendarToken;
    if(!token) return;
    setCalSyncStatus('syncing');
    try {
      const events=await fetchCalendarEvents(token, emailSettings.userEmail, emailSettings.calDaysAhead||14);
      setTasks(prev=>{
        let next=[...prev];
        const newIds=new Set(events.map(e=>e.calEventId));
        calSyncedIds.current.forEach((taskId,calEventId)=>{
          if(!newIds.has(calEventId)) {
            next=next.filter(t=>t.id!==taskId);
            calSyncedIds.current.delete(calEventId);
          }
        });
        events.forEach(ev=>{
          const existingTaskId=calSyncedIds.current.get(ev.calEventId);
          if(existingTaskId) {
            const idx=next.findIndex(t=>t.id===existingTaskId);
            if(idx>=0) next[idx]={...next[idx],title:ev.title,dueDate:ev.dueDate,scheduledDate:ev.scheduledDate,estimatedHours:ev.estimatedHours,description:ev.description,calUpdated:ev.calUpdated};
          } else {
            next.push(ev);
            calSyncedIds.current.set(ev.calEventId,ev.id);
          }
        });
        return next;
      });
      setCalSyncStatus('idle');
      const oooCount=events.filter(e=>e.isOOO).length;
      const meetCount=events.filter(e=>!e.isOOO).length;
      addAlert('calendar','📅 Calendar synced',meetCount+' meeting'+(meetCount!==1?'s':'')+' + '+oooCount+' day'+(oooCount!==1?'s':'')+' off imported.');
    } catch(e) { setCalSyncStatus('error'); addAlert('urgent','Calendar sync error',e.message); }
  }

  async function doSync(forceDemo, token, demoMode) {
    const useDemo=demoMode??isDemoMode, tok=token??gmailToken;
    setSyncStatus('syncing');
    try {
      if(useDemo) { setEmails(MOCK_EMAILS); }
      else if(tok) {
        const fetched=await fetchGmailEmails(tok, emailSettings.userEmail);
        setEmails(fetched);
      }
      const now=new Date(); setLastSync(now.getHours()+':'+String(now.getMinutes()).padStart(2,'0'));
      setSyncStatus('idle');
      addAlert('info','Sync complete','Emails imported and categorized.');
      if(calendarToken&&emailSettings.calAutoSync!==false) syncCalendar(calendarToken);
    } catch(e) { setSyncStatus('error'); addAlert('urgent','Sync error',e.message); }
  }

  async function connectGmail() {
    if(!emailSettings.clientId) { setShowSettings(true); return; }
    try {
      const tok=await new Promise((resolve,reject)=>{
        const client=google.accounts.oauth2.initTokenClient({client_id:emailSettings.clientId,scope:'https://www.googleapis.com/auth/gmail.readonly',callback:r=>r.error?reject(new Error(r.error)):resolve(r.access_token)});
        client.requestAccessToken();
      });
      setGmailToken(tok);
      if(Notification.permission==='default') await Notification.requestPermission();
      await doSync(false,tok,false);
    } catch(e) { addAlert('urgent','Gmail Error',e.message); }
  }

  async function connectCalendar() {
    if(!emailSettings.clientId) { setShowSettings(true); return; }
    try {
      const tok=await new Promise((resolve,reject)=>{
        const client=google.accounts.oauth2.initTokenClient({
          client_id:emailSettings.clientId,
          scope:'https://www.googleapis.com/auth/calendar.readonly',
          callback:r=>r.error?reject(new Error(r.error)):resolve(r.access_token)
        });
        client.requestAccessToken();
      });
      setCalendarToken(tok);
      if(Notification.permission==='default') await Notification.requestPermission();
      await syncCalendar(tok);
    } catch(e) { addAlert('urgent','Calendar Error',e.message); }
  }

  function handleSync(force) {
    if(isDemoMode||!gmailToken) { if(gmailToken||isDemoMode) doSync(); else connectGmail(); }
    else doSync();
  }

  function enableDemoMode() { setIsDemoMode(true); doSync(true,null,true); }

  function createTaskFromEmail(email) {
    const isPriHigh=email.urgent||email.category==='task';
    const newTask={id:uid(),title:email.subject.replace(/^\[.*?\]\s*/,''),priority:isPriHigh?'high':'medium',
      status:'todo',dueDate:today,scheduledDate:today,category:email.category==='jira'?'Jira':'Other',
      estimatedHours:1,description:'From: '+email.from+'\n\n'+email.snippet,fromEmail:true,createdAt:Date.now()};
    setTasks(p=>[...p,newTask]);
    setEmails(p=>p.map(e=>e.id===email.id?{...e,taskCreated:true}:e));
    addAlert('info','Task created','"'+newTask.title+'" added to your tasks.');
  }

  function markEmailRead(id) { setEmails(p=>p.filter(e=>e.id!==id)); }

  useEffect(()=>{
    const SYNC=[emailSettings.syncTime,'17:10'];
    const CHECK=['11:00','13:30','15:30'];
    const ALL=[...new Set([...SYNC,...CHECK])];
    const interval=setInterval(()=>{
      if(!gmailToken&&!isDemoMode) return;
      const ts=nowHHMM();
      const key=today+'_'+ts;
      if(schedulerFired.current.has(key)||!ALL.includes(ts)) return;
      schedulerFired.current.add(key);
      if(ts==='17:10') { doSync(); genTomorrowSuggestions(); }
      else if(SYNC.includes(ts)) doSync();
      else checkUrgent();
    },30000);
    return ()=>clearInterval(interval);
  },[gmailToken,isDemoMode,emailSettings.syncTime,emails,tasks]);

  const todayTaskCount=tasks.filter(t=>t.scheduledDate===today&&t.status!=='done').length;
  const overdueCount=tasks.filter(t=>t.status!=='done'&&diffDays(t.dueDate)<0).length;

  return (
    <div className="app">
      <AlertBanners alerts={alerts} onClose={id=>setAlerts(p=>p.filter(a=>a.id!==id))}/>
      {showForm&&<TaskForm onSave={saveTask} onClose={()=>{setShowForm(false);setEditTask(null);setPrefillDate(null);}} initial={editTask} prefillDate={prefillDate}/>}
      {showReschedule&&<RescheduleModal tasks={tasks} onReschedule={t=>{setTasks(t);setShowReschedule(false);}} onClose={()=>setShowReschedule(false)}/>}
      {showSettings&&<SettingsModal settings={emailSettings} onSave={s=>{setEmailSettings(s);setShowSettings(false);}} onClose={()=>setShowSettings(false)}/>}
      <div className="header">
        <div>
          <div className="header h1">📋 Work Task Planner</div>
          <div className="header-date">{fmtFull(today)}</div>
        </div>
        <div className="header-right">
          {todayTaskCount>0&&<div className="header-badge">📅 {todayTaskCount} today</div>}
          {overdueCount>0&&<div className="header-badge" style={{background:'rgba(252,129,129,.3)'}}>⚠ {overdueCount} overdue</div>}
          {(gmailToken||isDemoMode)&&<div className="header-badge gmail-status">✉ {isDemoMode?'Demo':'Gmail'}</div>}
          {calendarToken&&<div className="header-badge cal-status">📅 Calendar{calSyncStatus==='syncing'?'…':''}</div>}
          <button className="btn btn-gmail btn-sm" onClick={()=>setShowReschedule(true)}>⚡ Overload</button>
        </div>
      </div>
      <nav className="nav">
        {[['daily','🏠 Daily'],['weekly','📅 Weekly'],['all','📋 All Tasks'],['progress','📊 Progress'],['emails','✉ Emails'],['routine','🔩 Routine'],['tutorial','📔 Tutorial']].map(([v,label])=>(
          <button key={v} className={'nav-btn'+(view===v?' active':'')} onClick={()=>setView(v)}>
            {label}{v==='emails'&&emails.filter(e=>e.isNew).length>0&&<span style={{marginLeft:4,background:'#fc8181',color:'white',borderRadius:8,padding:'0 5px',fontSize:10,fontWeight:700}}>{emails.filter(e=>e.isNew).length}</span>}
          </button>
        ))}
        {view==='weekly'&&(
          <div style={{marginLeft:'auto',display:'flex',gap:4,alignItems:'center',padding:'4px 0'}}>
            <button className="btn btn-secondary btn-sm" onClick={()=>setWeekOffset(p=>p-1)}>‹</button>
            <button className="btn btn-secondary btn-sm" onClick={()=>setWeekOffset(0)}>Today</button>
            <button className="btn btn-secondary btn-sm" onClick={()=>setWeekOffset(p=>p+1)}>›</button>
          </div>
        )}
      </nav>
      <main className="main">
        {view==='daily'&&<DailyView tasks={tasks} routines={routineTasks} onToggle={toggleTask} onEdit={openEdit} onDelete={deleteTask} onAdd={openAdd} onReschedule={()=>setShowReschedule(true)} onAddRoutine={r=>openAdd(toISO(new Date()),{title:r.title,estimatedHours:r.estimatedHours||+(r.duration/60).toFixed(1),priority:r.priority,startTime:r.timeType==='range'?r.startTime:'',endTime:r.timeType==='range'?r.endTime:''})} onGoWeekly={()=>setView('weekly')} onSaveTask={task=>{setTasks(p=>{const i=p.findIndex(x=>x.id===task.id);return i>=0?p.map(x=>x.id===task.id?task:x):[...p,task];});}} top3={top3} onSwitchTop3={switchTop3Slot}/>}
        {view==='weekly'&&<WeeklyView tasks={tasks} weekOffset={weekOffset} onToggle={toggleTask} onEdit={openEdit} onAdd={openAdd}/>}
        {view==='all'&&<AllTasksView tasks={tasks} onToggle={toggleTask} onEdit={openEdit} onDelete={deleteTask} onAdd={openAdd}/>}
        {view==='progress'&&<ProgressView tasks={tasks}/>}
        {view==='routine'&&<RoutineSetup routines={routineTasks} onSave={saveRoutine} onDelete={deleteRoutine} onToggle={toggleRoutine}/>}
        {view==='tutorial'&&<TutorialView onSaveRoutine={saveRoutine} onGoToRoutine={()=>setView('routine')}/>}
        {view==='emails'&&<EmailsView emails={emails} syncStatus={syncStatus} lastSync={lastSync} isDemoMode={isDemoMode} gmailToken={gmailToken} emailSettings={emailSettings} onSync={handleSync} onCreateTask={createTaskFromEmail} onMarkRead={markEmailRead} onDemoMode={enableDemoMode} onOpenSettings={()=>setShowSettings(true)} onGenTomorrow={genTomorrowSuggestions} tomorrowSuggestions={tomorrowSuggestions}/>}
      </main>
      {(view==='daily'||view==='all')&&<button className="fab" onClick={()=>openAdd(null)} title="Add Task">＋</button>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
